<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="96" cy="96" r="95" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- Inner circle for contrast -->
  <circle cx="96" cy="96" r="88" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  
  <!-- Code brackets design -->
  <g transform="translate(96, 96)">
    <!-- Left bracket -->
    <path d="M -35 -25 L -50 -15 L -50 15 L -35 25" 
          fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right bracket -->
    <path d="M 35 -25 L 50 -15 L 50 15 L 35 25" 
          fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="white"/>
    
    <!-- Initials GM overlay (subtle) -->
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
          fill="white" text-anchor="middle" opacity="0.7">GM</text>
  </g>
</svg>